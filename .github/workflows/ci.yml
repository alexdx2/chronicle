name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    if: "!startsWith(github.ref, 'refs/tags/')"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: go test ./... -count=1 -v

  build:
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binaries
        run: |
          mkdir -p dist
          GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/chronicle-linux-amd64 ./cmd/chronicle
          GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o dist/chronicle-linux-arm64 ./cmd/chronicle
          GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/chronicle-darwin-amd64 ./cmd/chronicle
          GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/chronicle-darwin-arm64 ./cmd/chronicle
          GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/chronicle-windows-amd64.exe ./cmd/chronicle
      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: binaries
          path: dist/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Chronicle MCP ${{ github.ref_name }}
          files: dist/*

  publish-npm:
    runs-on: ubuntu-latest
    needs: release
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          registry-url: https://registry.npmjs.org
      - name: Sync version from git tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm && npm version "$VERSION" --no-git-tag-version --allow-same-version
      - run: cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
