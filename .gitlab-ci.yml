stages:
  - test
  - build
  - release
  - publish

test:
  stage: test
  image: golang:latest
  variables:
    GOTOOLCHAIN: auto
  script:
    - go test ./... -count=1 -v
  rules:
    - if: $CI_COMMIT_BRANCH && $CI_COMMIT_TAG == null

build:
  stage: build
  image: golang:latest
  variables:
    GOTOOLCHAIN: auto
  script:
    - mkdir -p dist
    - GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/oracle-linux-amd64 ./cmd/oracle
    - GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o dist/oracle-linux-arm64 ./cmd/oracle
    - GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/oracle-darwin-amd64 ./cmd/oracle
    - GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/oracle-darwin-arm64 ./cmd/oracle
    - GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/oracle-windows-amd64.exe ./cmd/oracle
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  rules:
    - if: $CI_COMMIT_TAG

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  script:
    - apk add --no-cache curl
    - |
      for binary in dist/*; do
        name=$(basename "$binary")
        echo "Uploading $name to generic package registry..."
        curl --header "JOB-TOKEN: $CI_JOB_TOKEN" \
          --upload-file "$binary" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/oracle/${CI_COMMIT_TAG}/${name}"
      done
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Oracle CLI $CI_COMMIT_TAG"
    assets:
      links:
        - name: oracle-linux-amd64
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/oracle/${CI_COMMIT_TAG}/oracle-linux-amd64"
        - name: oracle-linux-arm64
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/oracle/${CI_COMMIT_TAG}/oracle-linux-arm64"
        - name: oracle-darwin-amd64
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/oracle/${CI_COMMIT_TAG}/oracle-darwin-amd64"
        - name: oracle-darwin-arm64
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/oracle/${CI_COMMIT_TAG}/oracle-darwin-arm64"
        - name: oracle-windows-amd64.exe
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/oracle/${CI_COMMIT_TAG}/oracle-windows-amd64.exe"
  rules:
    - if: $CI_COMMIT_TAG

publish-npm:
  stage: publish
  image: node:lts
  needs:
    - job: release
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - cd npm && npm publish --access public
  rules:
    - if: $CI_COMMIT_TAG
