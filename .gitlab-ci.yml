stages:
  - test
  - build
  - release
  - publish

test:
  stage: test
  image: golang:latest
  variables:
    GOTOOLCHAIN: auto
  script:
    - go test ./... -count=1 -v

build:
  stage: build
  image: golang:latest
  variables:
    GOTOOLCHAIN: auto
  script:
    - mkdir -p dist
    - GOOS=linux GOARCH=amd64 go build -ldflags "-s -w" -o dist/oracle-linux-amd64 ./cmd/oracle
    - GOOS=linux GOARCH=arm64 go build -ldflags "-s -w" -o dist/oracle-linux-arm64 ./cmd/oracle
    - GOOS=darwin GOARCH=amd64 go build -ldflags "-s -w" -o dist/oracle-darwin-amd64 ./cmd/oracle
    - GOOS=darwin GOARCH=arm64 go build -ldflags "-s -w" -o dist/oracle-darwin-arm64 ./cmd/oracle
    - GOOS=windows GOARCH=amd64 go build -ldflags "-s -w" -o dist/oracle-windows-amd64.exe ./cmd/oracle
  artifacts:
    paths:
      - dist/
    expire_in: 30 days
  only:
    - tags

release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs:
    - job: build
      artifacts: true
  script:
    - echo "Creating release for $CI_COMMIT_TAG"
  release:
    tag_name: $CI_COMMIT_TAG
    description: "Oracle CLI $CI_COMMIT_TAG"
    assets:
      links:
        - name: oracle-linux-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/oracle-linux-amd64?job=build"
        - name: oracle-linux-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/oracle-linux-arm64?job=build"
        - name: oracle-darwin-amd64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/oracle-darwin-amd64?job=build"
        - name: oracle-darwin-arm64
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/oracle-darwin-arm64?job=build"
        - name: oracle-windows-amd64.exe
          url: "${CI_PROJECT_URL}/-/jobs/artifacts/${CI_COMMIT_TAG}/raw/dist/oracle-windows-amd64.exe?job=build"
  only:
    - tags

publish-npm:
  stage: publish
  image: node:lts
  needs:
    - job: release
  script:
    - echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
    - cd npm && npm publish --access public
  only:
    - tags
